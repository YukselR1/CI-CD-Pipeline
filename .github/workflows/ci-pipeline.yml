name: MegaMarket CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Kopyala
      uses: actions/checkout@v3

    - name: Python Kur
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"

    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Kod Yazım Hatalarını Denetle (Linter)
      run: |
        # Bu komut kodda syntax hatası varsa pipeline'ı anında durdurur
        python -m compileall .

    - name: Otomatik Testleri Çalıştır
      run: |
        # Burada ileride yazacağın testler çalışır
        echo "Testler başarıyla tamamlandı!"