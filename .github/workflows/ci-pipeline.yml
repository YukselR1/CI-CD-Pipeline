name: MegaMarket CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Kodları GitHub'dan Çek
      uses: actions/checkout@v3

    - name: 2. Python Ortamını Kur (Python 3.9)
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"

    - name: 3. Bağımlılıkları Yükle (requirements.txt)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. Kod Yazım ve Hata Denetimi (Linter/Syntax)
      run: |
        # Bu adım, kodda tek bir yazım hatası bile olsa Pipeline'ı durdurur!
        python -m compileall .

    - name: 5. Otomatik Birim Testleri Çalıştır
      run: |
        echo "Birim testleri simüle ediliyor... [OK]"
        # İleride 'pytest' komutu buraya gelecek

    - name: 6. Docker İmajını Hazırla (Kesintisiz Güncelleme Hazırlığı)
      run: |
        echo "Kod testlerden geçti! Yeni sürüm için Docker paketi oluşturuluyor..."
        # GitHub'ın kendi içinde Docker kurulu olduğu için bu adım hata vermez.
        docker build -t megamarket-app:${{ github.sha }} .
        echo "Başarılı: Yeni sürüm uygulamayı kapatmadan yayına alınmaya hazır!"